<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>N5れんしゅう③</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 16px;
    font-family: sans-serif;
    background: #f7f7f7;
    color: #222;
    text-align: center;
  }

  h1 {
    font-size: 1.8rem;
    margin-bottom: 20px;
  }

  #quizArea {
    max-width: 500px;
    margin: 0 auto;
  }

  #questionNumber {
    font-size: 1.1rem;
    margin-bottom: 10px;
    color: #555;
  }

  #questionBox {
    font-size: 1.8rem;
    line-height: 1.8;
    background: white;
    padding: 24px 16px;
    border-radius: 14px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  #optionsBox {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option {
    width: 100%;
    padding: 18px 12px;
    font-size: 1.5rem;
    border: none;
    border-radius: 14px;
    background: white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    cursor: pointer;
  }

  .correct { font-size: 3rem; color: red; font-weight: bold; }
  .wrong { font-size: 3rem; color: blue; font-weight: bold; }

  #judge {
    height: 70px;
    margin-top: 18px;
  }

  #result {
    margin-top: 30px;
    text-align: left;
    background: white;
    padding: 16px;
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  #resultTable {
    width: 100%;
    border-collapse: collapse;
  }

  #resultTable td {
    padding: 10px 6px;
    border-bottom: 1px solid #eee;
    font-size: 1.05rem;
  }

  .markCol {
    width: 50px;
    font-weight: bold;
    font-size: 1.3rem;
  }
</style>
</head>

<body>

<h1>N5れんしゅう③</h1>

<div id="quizArea">
  <div id="questionNumber"></div>
  <div id="questionBox"></div>
  <div id="optionsBox"></div>
  <div id="judge"></div>
  <div id="result"></div>
</div>

<script>

// ===== 問題 =====
const questions = [
  { sentence: "（　　）で 6かいへ いきます。", answer: "エレベーター", options: ["エレベーター", "トイレ", "ニュース", "ティッシュ"] },
  { sentence: "ほんを わすれました。（　　） ください。", answer: "かして", options: ["かえして", "もらって", "はらって", "かして"] },
  { sentence: "まいあさ 7じに （　　）。", answer: "おきる", options: ["おきた", "おきる", "おそい", "はやい"] },
  { sentence: "まいばん 9じごろ おふろに （　　）。", answer: "はいります", options: ["はいります", "あびます", "およぎます", "のります"] },
  { sentence: "このりょうりは あじが （　　）です。", answer: "うすい", options: ["つよい", "すくない", "うすい", "こわい"] },
  { sentence: "カレンさんは （　　）が ながくて、めが おおきいです。", answer: "かみ", options: ["かみ", "せ", "きれい", "はな"] },
  { sentence: "ほっかいどうは にほんの （　　）のほうに あります。", answer: "きた", options: ["きた", "みなみ", "ひがし", "にし"] },
  { sentence: "でんしゃに のるとき （　　）が いります。", answer: "きっぷ", options: ["きっぷ", "きって", "てがみ", "えき"] },
  { sentence: "かぜを ひいたので （　　）が ほしいです。", answer: "くすり", options: ["プレゼント", "いしゃ", "びょういん", "くすり"] },
  { sentence: "にほんごの （　　）は すいようびの ごご2じからです。", answer: "クラス", options: ["せんせい", "がくせい", "クラス", "へや"] },
  { sentence: "かようびの まえは （　　） です。", answer: "げつようび", options: ["げつようび", "すいようび", "どようび", "もくようび"] },
  { sentence: "コーヒーに （　　）と ミルクを いれます。", answer: "さとう", options: ["さとう", "しお", "こしょう", "ぎゅうにゅう"] },
  { sentence: "「 （　　）は なんですか？」「かいしゃいんです。」", answer: "しごと", options: ["おとし", "おくに", "しゅみ", "しごと"] },
  { sentence: "（　　）が あったら、てをあげてください。", answer: "しつもん", options: ["なに", "しつもん", "こたえ", "あし"] },
  { sentence: "このりょうりは （　　）ないです 。", answer: "からく", options: ["からいじゃ", "からくて", "からく", "からい"] },
  { sentence: "かいぎの ひは しろい （　　）を きてください。", answer: "シャツ", options: ["ズボン", "くつ", "パンツ", "シャツ"] },
  { sentence: "レストランが たくさんあります。（　　）みせへ いきたいですか。", answer: "どの", options: ["どれ", "なん", "どっち", "どの"] },
  { sentence: "ひるやすみに （　　）で ランチを たべます。", answer: "しょくどう", options: ["しょくどう", "スーパー", "フロント", "トイレ"] },
  { sentence: "ぎんこうは ごご３じ （　　） です。", answer: "まで", options: ["はん", "に", "から", "まで"] },
  { sentence: "タバコを （　　）と からだに わるいです。", answer: "すう", options: ["たべる", "のむ", "けむり", "すう"] },
];

// ===== 状態 =====
let current = 0;
let score = 0;
let answering = false;
let answerLog = [];
let quizList = [];

// ===== 開始 =====
startGame();

function startGame() {
  quizList = shuffle([...questions]);
  showQuestion();
}

// ===== 問題表示 =====
function showQuestion() {
  const q = quizList[current];

  if (!q) {
    finishQuiz();
    return;
  }

  document.getElementById("questionNumber").textContent =
    `もんだい ${current + 1}`;

  document.getElementById("questionBox").textContent =
    q.sentence;

  document.getElementById("judge").innerHTML = "";

  const optionsBox = document.getElementById("optionsBox");
  optionsBox.innerHTML = "";

  const options = q.options || [];

  shuffle([...options]).forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(opt);
    optionsBox.appendChild(btn);
  });
}

// ===== 回答チェック =====
function checkAnswer(choice) {
  if (answering) return;
  answering = true;

  const q = quizList[current];
  const judgeBox = document.getElementById("judge");

  const correct = (choice === q.answer);

  if (correct) {
    score++;
    judgeBox.innerHTML = "<span class='correct'>○</span>";
  } else {
    judgeBox.innerHTML = "<span class='wrong'>×</span>";
  }

  answerLog.push({
    question: q.sentence,
    answer: q.answer,
    correct: correct
  });

  setTimeout(() => {
    current++;
    answering = false;
    showQuestion();
  }, 600);
}

// ===== おわり =====
function finishQuiz() {
  document.getElementById("questionNumber").textContent = "";
  document.getElementById("questionBox").innerHTML =
    `おわり！<br><br>${score} / ${quizList.length} てん`;

  document.getElementById("optionsBox").innerHTML = "";
  document.getElementById("judge").innerHTML = "";

  let html = `<h3>こたえ</h3><table id="resultTable">`;

  answerLog.forEach(log => {

    const mark = log.correct ? "○" : "×";

    const text = log.question.replace(
      "（　　）",
      `<b style="color:red;">${log.answer}</b>`
    );

    html += `
      <tr>
        <td class="markCol">${mark}</td>
        <td>${text}</td>
      </tr>
    `;
  });

  html += `</table>`;

  document.getElementById("result").innerHTML = html;
}

// ===== シャッフル =====
function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

</script>

</body>
</html>
