<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>N5れんしゅう④</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 16px;
    font-family: sans-serif;
    background: #f7f7f7;
    color: #222;
    text-align: center;
  }

  h1 { font-size: 1.8rem; margin-bottom: 20px; }

  #quizArea { max-width: 500px; margin: 0 auto; }

  #questionNumber {
    font-size: 1.1rem;
    margin-bottom: 10px;
    color: #555;
  }

  #questionBox {
    font-size: 1.8rem;
    line-height: 1.8;
    background: white;
    padding: 24px 16px;
    border-radius: 14px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  #optionsBox {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option {
    width: 100%;
    padding: 18px 12px;
    font-size: 1.5rem;
    border: none;
    border-radius: 14px;
    background: white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    cursor: pointer;
  }

  .correct { font-size: 3rem; color: red; font-weight: bold; }
  .wrong { font-size: 3rem; color: blue; font-weight: bold; }

  #result {
    margin-top: 30px;
    text-align: left;
    background: white;
    padding: 16px;
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  #retryBtn {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    font-size: 1.2rem;
    border: none;
    border-radius: 10px;
    background: #ffcc00;
    cursor: pointer;
  }

  #resultTable {
    width: 100%;
    border-collapse: collapse;
  }

  #resultTable td {
    padding: 10px 6px;
    border-bottom: 1px solid #eee;
    font-size: 1.05rem;
  }

  .markCol {
    width: 50px;
    font-weight: bold;
    font-size: 1.3rem;
  }
</style>
</head>

<body>

<h1>N5れんしゅう④</h1>

<div id="quizArea">
  <div id="questionNumber"></div>
  <div id="questionBox"></div>
  <div id="optionsBox"></div>
  <div id="judge"></div>
  <div id="result"></div>
</div>

<script>

// ===== 20問 =====
const questions = [
  { sentence: "ふじさんは にほんで いちばん （　　） やまです。", answer: "たかい", options: ["ひくい", "ゆうめい", "たかい", "ひろい"] },
  { sentence: "「どんな（　　）がすきですか。」「にほんりょうりが すきです。」", answer: "たべもの", options: ["ところ", "たべもの", "のみもの", "くつ"] },
  { sentence: "このしんかんせんは ごご2じに とうきょうえきに （　　）。", answer: "つきます", options: ["つきます", "のります", "もってきます", "でます"] },
  { sentence: "１０ねんかん このかいしゃで （　　）。", answer: "はたらいています", options: ["いっています", "はたらいています", "はいっています", "しごとです"] },
  { sentence: "にほんと インドネシアと （　　）のほうが ひろいですか。", answer: "どちら", options: ["どれ", "なに", "なん", "どちら"] },
  { sentence: "まいにち しゅくだいを （　　）。", answer: "しなければなりません", options: ["おわらなければなりません", "しなければなりません", "かきなければなりません", "しなくてもなりません"] },
  { sentence: "しょうらい なにに （　　）ですか。", answer: "なりたい", options: ["なりたい", "やりたい", "いきたい", "したい"] },
  { sentence: "テレビで （　　）を みています。", answer: "ニュース", options: ["ニュース", "しんぶん", "なに", "どこ"] },
  { sentence: "けさ はやく おきたので （　　）です。", answer: "ねむい", options: ["ねます", "ねむい", "ねむり", "ねる"] },
  { sentence: "くるまは うんてん できませんが、（　　）は できます。", answer: "バイク", options: ["バス", "バイク", "あるく", "じどうしゃ"] },
  { sentence: "（　　）を つかって しごとを します。", answer: "パソコン", options: ["エアコン", "パスポート", "バター", "パソコン"] },
  { sentence: "たなかさんは ピアノを （　　）のが じょうずです。", answer: "ひく", options: ["おす", "さわる", "つける", "ひく"] },
  { sentence: "えが すきですから よく（　　）へ いきます。", answer: "びじゅつかん", options: ["えき", "としょかん", "えいがかん", "びじゅつかん"] },
  { sentence: "ともだちは たいせつですが、（　　）のじかんも たいせつです。", answer: "ひとり", options: ["とけい", "ねる", "ひとり", "あそぶ"] },
  { sentence: "（　　）は あついので きらいです。", answer: "なつ", options: ["ふゆ", "なつ", "きのう", "ゆき"] },
  { sentence: "アニメをみて にほんごを （　　）しました。", answer: "べんきょう", options: ["おぼえ", "ならい", "おしえ", "べんきょう"] },
  { sentence: "りょこうの とき すてきな （　　）に とまるのが すきです。", answer: "ホテル", options: ["うち", "みち", "しんかんせん", "ホテル"] },
  { sentence: "かれは （　　）じかんで たくさん かんじを おぼえました。", answer: "みじかい", options: ["すこし", "ちいさい", "みじかい", "ほそい"] },
  { sentence: "この りんごは （　　）、おいしいです。", answer: "あまくて", options: ["あまくて", "からくて", "ふるくて", "うすくて"] },
  { sentence: "しゅくだいを しましたが、（　　）のを わすれました。", answer: "もってくる", options: ["する", "かく", "もつ", "もってくる"] },
];

// ===== 状態 =====
let quizList = [];
let current = 0;
let answering = false;
let answerLog = [];
let wrongList = [];

// ===== 開始 =====
startQuiz(questions);

// ===== 共通開始 =====
function startQuiz(list) {
  quizList = shuffle([...list]);
  current = 0;
  answerLog = [];
  wrongList = [];
  document.getElementById("result").innerHTML = "";
  showQuestion();
}

// ===== 問題表示 =====
function showQuestion() {
  const q = quizList[current];

  if (!q) {
    finishQuiz();
    return;
  }

  document.getElementById("questionNumber").textContent =
    `もんだい ${current + 1} / ${quizList.length}`;

  document.getElementById("questionBox").textContent = q.sentence;
  document.getElementById("judge").innerHTML = "";

  const box = document.getElementById("optionsBox");
  box.innerHTML = "";

  shuffle([...q.options]).forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(opt);
    box.appendChild(btn);
  });
}

// ===== 回答 =====
function checkAnswer(choice) {
  if (answering) return;
  answering = true;

  const q = quizList[current];
  const correct = (choice === q.answer);

  document.getElementById("judge").innerHTML =
    correct ? "<span class='correct'>○</span>" : "<span class='wrong'>×</span>";

  answerLog.push({
    sentence: q.sentence,
    answer: q.answer,
    correct
  });

  if (!correct) {
    wrongList.push(q);
  }

  setTimeout(() => {
    current++;
    answering = false;
    showQuestion();
  }, 500);
}

// ===== 終了画面 =====
function finishQuiz() {

  const correctCount = answerLog.filter(a => a.correct).length;

  document.getElementById("questionNumber").textContent = "";
  document.getElementById("questionBox").innerHTML =
    `おわり！<br><br>${correctCount} / ${quizList.length} てん`;

  document.getElementById("optionsBox").innerHTML = "";
  document.getElementById("judge").innerHTML = "";

  let html = `<h3>こたえ</h3><table id="resultTable">`;

  answerLog.forEach(log => {
    const mark = log.correct ? "○" : "×";
    html += `
      <tr>
        <td class="markCol">${mark}</td>
        <td>${log.sentence.replace("（　　）", `<b style="color:red">${log.answer}</b>`)}</td>
      </tr>
    `;
  });

  html += "</table>";

  if (wrongList.length > 0) {
    html += `<button id="retryBtn" onclick="retryWrong()">まちがえた もんだいを もういちど</button>`;
  }

  document.getElementById("result").innerHTML = html;
}

// ===== やり直し =====
function retryWrong() {
  startQuiz(wrongList);
}

// ===== シャッフル =====
function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

</script>

</body>
</html>
