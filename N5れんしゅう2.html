<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>N5れんしゅう②</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 16px;
    font-family: sans-serif;
    background: #f7f7f7;
    color: #222;
    text-align: center;
  }

  h1 {
    font-size: 1.8rem;
    margin-bottom: 20px;
  }

  #quizArea {
    max-width: 500px;
    margin: 0 auto;
  }

  #questionNumber {
    font-size: 1.1rem;
    margin-bottom: 10px;
    color: #555;
  }

  #questionBox {
    font-size: 1.8rem;
    line-height: 1.8;
    background: white;
    padding: 24px 16px;
    border-radius: 14px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  #optionsBox {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option {
    width: 100%;
    padding: 18px 12px;
    font-size: 1.5rem;
    border: none;
    border-radius: 14px;
    background: white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    cursor: pointer;
  }

  .correct { font-size: 3rem; color: red; font-weight: bold; }
  .wrong { font-size: 3rem; color: blue; font-weight: bold; }

  #judge {
    height: 70px;
    margin-top: 18px;
  }

  #result {
    margin-top: 30px;
    text-align: left;
    background: white;
    padding: 16px;
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  #resultTable {
    width: 100%;
    border-collapse: collapse;
  }

  #resultTable td {
    padding: 10px 6px;
    border-bottom: 1px solid #eee;
    font-size: 1.05rem;
  }

  .markCol {
    width: 50px;
    font-weight: bold;
    font-size: 1.3rem;
  }
</style>
</head>

<body>

<h1>N5れんしゅう②</h1>

<div id="quizArea">
  <div id="questionNumber"></div>
  <div id="questionBox"></div>
  <div id="optionsBox"></div>
  <div id="judge"></div>
  <div id="result"></div>
</div>

<script>

// ===== 問題 =====
const questions = [
  { sentence: "かのじょと えきで （　　）。", answer: "あいます", options: ["あいます", "いります", "あります", "きます"] },
  { sentence: "へやを （　　） します。", answer: "そうじ", options: ["せんたく", "そうじ", "べんきょう", "でんわ"] },
  { sentence: "あめが ふっています から （　　） をさします。", answer: "かさ", options: ["シャツ", "まど", "やすみ", "かさ"] },
  { sentence: "１にちに ８（　　） はたらきます。", answer: "じかん", options: ["じ", "ふん", "じかん", "にち"] },
  { sentence: "けさ バナナ （　　） たべました。", answer: "だけ", options: ["や", "くだもの", "で", "だけ"] },
  { sentence: "うちに いぬが 6（　　） います。", answer: "ぴき", options: ["ぴき", "にん", "こ", "いぬ"] },
  { sentence: "１（　　） は １００センチです。", answer: "メートル", options: ["キロメートル", "インチ", "メートル", "キログラム"] },
  { sentence: "ゆうびんきょくと びょういんの （　　） に だいがくがあります。", answer: "あいだ", options: ["みぎ", "なか", "となり", "あいだ"] },
  { sentence: "にほんの ポストは （　　） です。", answer: "あかい", options: ["あかい", "あおい", "くろい", "しろい"] },
  { sentence: "（　　） は ゆきが ふるでしょう。", answer: "あした", options: ["おととい", "きのう", "あした", "せんしゅう"] },
  { sentence: "うちへ かえる （　　） に、デパートへ いきます。", answer: "まえ", options: ["まえ", "こと", "あと", "くるま"] },
  { sentence: "まいあさ （　　） かいしゃへ いきます。", answer: "あるいて", options: ["あるいて", "バス", "パソコンで", "しごと"] },
  { sentence: "このケーキは とても （　　）です。", answer: "あまい", options: ["あまい", "にがい", "すっぱい", "からい"] },
  { sentence: "このれいぞうこは （　　） ですか。", answer: "いくら", options: ["どのくらい", "いくつ", "いくら", "なに"] },
  { sentence: "おなかが （　　）ですから、やすんでもいいですか。", answer: "いたい", options: ["あつい", "おおきい", "さむい", "いたい"] },
  { sentence: "やまださんは どこに （　　） か。", answer: "います", options: ["います", "あります", "いません", "にほんじんです"] },
  { sentence: "「スーパー」や「コンビニ」は （　　） で かきます。", answer: "カタカナ", options: ["ひらがな", "カタカナ", "デパート", "おかね"] },
  { sentence: "らいげつ あかちゃんが （　　） よていです。", answer: "うまれる", options: ["ちいさい", "でる", "はやい", "うまれる"] },
  { sentence: "らいしゅうは さむいので （　　）を もってきてください。", answer: "うわぎ", options: ["したぎ", "うわぎ", "かいぎ", "むぎ"] },
  { sentence: "あさって （　　）で えいがを みませんか。", answer: "えいがかん", options: ["レストラン", "えいがかん", "DVDや", "アクション"] },
];

// ===== 状態 =====
let current = 0;
let score = 0;
let answering = false;
let answerLog = [];
let quizList = [];

// ===== 開始 =====
startGame();

function startGame() {
  quizList = shuffle([...questions]);
  showQuestion();
}

// ===== 問題表示 =====
function showQuestion() {
  const q = quizList[current];

  if (!q) {
    finishQuiz();
    return;
  }

  document.getElementById("questionNumber").textContent =
    `もんだい ${current + 1}`;

  document.getElementById("questionBox").textContent =
    q.sentence;

  document.getElementById("judge").innerHTML = "";

  const optionsBox = document.getElementById("optionsBox");
  optionsBox.innerHTML = "";

  const options = q.options || [];

  shuffle([...options]).forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(opt);
    optionsBox.appendChild(btn);
  });
}

// ===== 回答チェック =====
function checkAnswer(choice) {
  if (answering) return;
  answering = true;

  const q = quizList[current];
  const judgeBox = document.getElementById("judge");

  const correct = (choice === q.answer);

  if (correct) {
    score++;
    judgeBox.innerHTML = "<span class='correct'>○</span>";
  } else {
    judgeBox.innerHTML = "<span class='wrong'>×</span>";
  }

  answerLog.push({
    question: q.sentence,
    answer: q.answer,
    correct: correct
  });

  setTimeout(() => {
    current++;
    answering = false;
    showQuestion();
  }, 600);
}

// ===== 終了 =====
function finishQuiz() {
  document.getElementById("questionNumber").textContent = "";
  document.getElementById("questionBox").innerHTML =
    `おわり！<br><br>${score} / ${quizList.length} てん`;

  document.getElementById("optionsBox").innerHTML = "";
  document.getElementById("judge").innerHTML = "";

  let html = `<h3>こたえ</h3><table id="resultTable">`;

  answerLog.forEach(log => {

    const mark = log.correct ? "○" : "×";

    const text = log.question.replace(
      "（　　）",
      `<b style="color:red;">${log.answer}</b>`
    );

    html += `
      <tr>
        <td class="markCol">${mark}</td>
        <td>${text}</td>
      </tr>
    `;
  });

  html += `</table>`;

  document.getElementById("result").innerHTML = html;
}

// ===== シャッフル =====
function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

</script>

</body>
</html>
